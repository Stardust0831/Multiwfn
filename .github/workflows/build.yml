name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nogui:
    name: noGUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake ninja-build libblas-dev liblapack-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gcc cmake ninja
          echo "FC=$(ls $(brew --prefix)/bin/gfortran-* | sort -V | tail -n 1)" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-openblas

      - name: Configure and build
        if: runner.os != 'Windows'
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release 2>&1 | tee configure.log
          cmake --build build --parallel 2>&1 | tee build.log

      - name: Configure and build on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          test -s "$MINGW_PREFIX/lib/libopenblas.a"
          ls -l "$MINGW_PREFIX"/lib/libopenblas*
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release 2>&1 | tee configure.log
          cmake --build build --parallel 2>&1 | tee build.log

      - name: Summarize build failure
        if: failure() && runner.os != 'Windows'
        run: |
          {
            echo "## Build failure tail"
            echo
            echo '```text'
            tail -n 200 build.log 2>/dev/null || tail -n 200 configure.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          first_error="$(grep -Eim1 '(^|: )(fatal error|error:|undefined reference|ld:|ninja: build stopped)' build.log configure.log 2>/dev/null || true)"
          if [ -n "$first_error" ]; then
            echo "::error::$first_error"
          fi

      - name: Summarize Windows build failure
        if: failure() && runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          {
            echo "## Build failure tail"
            echo
            echo '```text'
            tail -n 200 build.log 2>/dev/null || tail -n 200 configure.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          first_error="$(grep -Eim1 '(^|: )(fatal error|error:|undefined reference|ld:|ninja: build stopped)' build.log configure.log 2>/dev/null || true)"
          if [ -n "$first_error" ]; then
            echo "::error::$first_error"
          fi

      - name: Functional tests
        if: runner.os != 'Windows'
        run: |
          bash tests/functional/run_nogui_tests.sh "$PWD/build/Multiwfn_noGUI"

      - name: Functional tests on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          bash tests/functional/run_nogui_tests.sh "$PWD/build/Multiwfn_noGUI.exe"

      - name: Check Windows DLL dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          objdump -p build/Multiwfn_noGUI.exe | tee windows-dlls.log
          forbidden='DLL Name: (libopenblas|libgfortran|libgcc_s|libquadmath|libgomp|libwinpthread|liblapack|libblas)'
          if grep -Ei "$forbidden" windows-dlls.log; then
            echo "::error::Windows executable still depends on redistributable compiler/math DLLs; static linking is incomplete."
            exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: Multiwfn_noGUI-${{ runner.os }}
          path: |
            build/Multiwfn_noGUI
            build/Multiwfn_noGUI.exe
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: nogui
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp LICENSE.txt release-assets/LICENSE.txt
          cp release-artifacts/Multiwfn_noGUI-Linux/Multiwfn_noGUI release-assets/Multiwfn_noGUI
          tar -czf release-assets/Multiwfn_noGUI-Linux.tar.gz -C release-assets Multiwfn_noGUI LICENSE.txt
          rm release-assets/Multiwfn_noGUI
          cp release-artifacts/Multiwfn_noGUI-macOS/Multiwfn_noGUI release-assets/Multiwfn_noGUI
          tar -czf release-assets/Multiwfn_noGUI-macOS.tar.gz -C release-assets Multiwfn_noGUI LICENSE.txt
          rm release-assets/Multiwfn_noGUI
          cp release-artifacts/Multiwfn_noGUI-Windows/Multiwfn_noGUI.exe release-assets/Multiwfn_noGUI.exe
          zip -j release-assets/Multiwfn_noGUI-Windows.zip release-assets/Multiwfn_noGUI.exe release-assets/LICENSE.txt
          rm release-assets/Multiwfn_noGUI.exe
          sha256sum release-assets/* > release-assets/SHA256SUMS.txt
          cat > RELEASE_NOTES.md <<'EOF'
          Cross-platform noGUI build of Multiwfn 2026.6.2.

          This release keeps the upstream Fortran source behavior and adds a minimal CMake/GitHub Actions build path for noGUI binaries.
          The upstream Multiwfn license is included as LICENSE.txt in this release and inside each platform archive.

          Validation in CI:
          - Linux, macOS, and Windows builds with GNU Fortran.
          - Geometry-only XYZ loading and structure analysis workflow.
          - Gaussian cube loading, grid statistics, and cube export workflow.

          Notes:
          - These are noGUI binaries; DISLIN/Motif GUI support is intentionally outside this release.
          - Fractional-derivative support is disabled in the default CI build.
          EOF

      - name: Verify license packaging
        run: |
          set -euo pipefail
          test -s LICENSE.txt
          test -s release-assets/LICENSE.txt
          cmp LICENSE.txt release-assets/LICENSE.txt
          tar -tzf release-assets/Multiwfn_noGUI-Linux.tar.gz | grep -Fx LICENSE.txt
          tar -tzf release-assets/Multiwfn_noGUI-macOS.tar.gz | grep -Fx LICENSE.txt
          unzip -Z1 release-assets/Multiwfn_noGUI-Windows.zip | grep -Fx LICENSE.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "Multiwfn 2026.6.2 noGUI cross-platform build" \
            --notes-file RELEASE_NOTES.md
