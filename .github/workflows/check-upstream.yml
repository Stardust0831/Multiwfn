name: check-upstream

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:
    inputs:
      create_issue:
        description: Create or update an issue when a newer official source archive is found.
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: check-upstream
  cancel-in-progress: false

jobs:
  check:
    name: Check official source archive
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream release page
        id: upstream
        run: |
          set -euo pipefail
          mkdir -p upstream-check
          python3 tools/upstream/check_multiwfn_release.py \
            --json-out upstream-check/result.json \
            --summary-out upstream-check/summary.md
          cat upstream-check/summary.md >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          result = json.loads(Path("upstream-check/result.json").read_text())
          latest = result.get("latest") or {}
          print(f"newer_available={str(result['newer_available']).lower()}")
          print(f"current_version={result['current_version']}")
          print(f"latest_version={latest.get('version', '')}")
          print(f"latest_name={latest.get('name', '')}")
          print(f"latest_url={latest.get('url', '')}")
          PY

      - name: Upload check result
        uses: actions/upload-artifact@v4
        with:
          name: multiwfn-upstream-check
          path: upstream-check/
          if-no-files-found: error

      - name: Create tracking issue
        if: >-
          steps.upstream.outputs.newer_available == 'true' &&
          (
            vars.MULTIWFN_UPSTREAM_CREATE_ISSUE == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.create_issue)
          )
        uses: actions/github-script@v7
        env:
          CURRENT_VERSION: ${{ steps.upstream.outputs.current_version }}
          LATEST_VERSION: ${{ steps.upstream.outputs.latest_version }}
          LATEST_NAME: ${{ steps.upstream.outputs.latest_name }}
          LATEST_URL: ${{ steps.upstream.outputs.latest_url }}
        with:
          script: |
            const title = `Track official Multiwfn source ${process.env.LATEST_VERSION}`;
            const label = 'upstream';
            const {owner, repo} = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });
            const duplicate = existing.find(issue => issue.title === title);
            const body = [
              `Official Multiwfn source archive appears newer than the imported source.`,
              ``,
              `- Current imported source: \`${process.env.CURRENT_VERSION}\``,
              `- Latest official archive: \`${process.env.LATEST_NAME}\``,
              `- URL: ${process.env.LATEST_URL}`,
              ``,
              `Use the dedicated upstream tracking branch and open a manual PR after importing the official source snapshot and replaying local modular patches. Do not merge directly into \`main\`.`,
            ].join('\n');
            if (duplicate) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body,
              });
            } else {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: '0366d6',
                  description: 'Official upstream source tracking',
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label],
              });
            }
