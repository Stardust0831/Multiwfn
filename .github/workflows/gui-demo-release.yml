name: gui-demo-release

on:
  push:
    tags:
      - 'gui-demo-preview-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package 3Dmol GUI demo (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            asset_ext: tar.gz
          - os: macos-latest
            platform: macOS
            asset_ext: tar.gz
          - os: windows-latest
            platform: Windows
            asset_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gfortran cmake ninja-build libblas-dev liblapack-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install gcc cmake ninja
          echo "FC=$(ls $(brew --prefix)/bin/gfortran-* | sort -V | tail -n 1)" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-openblas

      - name: Build 3Dmol GUI demo executable
        if: runner.os != 'Windows'
        run: |
          set -o pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            rpath='@loader_path/resources/lib'
          else
            rpath='$ORIGIN/resources/lib'
          fi
          cmake -S . -B build-3dmol-gui -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMULTIWFN_GUI_BACKEND=3dmol \
            -DMULTIWFN_GNU_HOT_OPT_LEVEL=O3 \
            -DCMAKE_BUILD_RPATH="$rpath" 2>&1 | tee configure.log
          cmake --build build-3dmol-gui --parallel 2 2>&1 | tee build.log
          test -x build-3dmol-gui/Multiwfn_3DmolGUI

      - name: Build 3Dmol GUI demo executable on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          cmake -S . -B build-3dmol-gui -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMULTIWFN_GUI_BACKEND=3dmol \
            -DMULTIWFN_GNU_HOT_OPT_LEVEL=O3 2>&1 | tee configure.log
          cmake --build build-3dmol-gui --parallel 2 2>&1 | tee build.log
          test -x build-3dmol-gui/Multiwfn_3DmolGUI.exe

      - name: Summarize build failure
        if: failure()
        shell: bash
        run: |
          {
            echo "## GUI demo build failure tail"
            echo
            echo '```text'
            tail -n 200 build.log 2>/dev/null || tail -n 200 configure.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          first_error="$(grep -Eim1 '(^|: )(fatal error|error:|undefined reference|ld:|ninja: build stopped)' build.log configure.log 2>/dev/null || true)"
          if [ -n "$first_error" ]; then
            echo "::error::$first_error"
          fi

      - name: Prepare common package files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="gui-demo-preview-manual-${GITHUB_RUN_NUMBER}"
          fi
          pkg="Multiwfn-3dmol-gui-demo-${tag}-${{ matrix.platform }}"
          echo "PKG=$pkg" >> "$GITHUB_ENV"
          mkdir -p "package/${pkg}/resources/lib" "package/${pkg}/resources/tools" "package/${pkg}/resources/frontend"
          cp LICENSE.txt "package/${pkg}/LICENSE.txt"
          cp settings.ini "package/${pkg}/settings.ini"
          cp tools/multiwfn_3dmol_server.py "package/${pkg}/resources/tools/"
          cp tools/multiwfn_3dmol_file_dialog.py "package/${pkg}/resources/tools/"
          cp -R frontend/3dmol-viewer "package/${pkg}/resources/frontend/"

      - name: Package Linux demo
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cp build-3dmol-gui/Multiwfn_3DmolGUI "package/${PKG}/Multiwfn_3DmolGUI"
          ldd build-3dmol-gui/Multiwfn_3DmolGUI > linux-runtime-libs.txt
          awk '/=> \// {print $3}' linux-runtime-libs.txt | while read -r lib; do
            base="$(basename "$lib")"
            case "$base" in
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|ld-linux-*.so.*|libmvec.so.*|librt.so.*|libresolv.so.*)
                ;;
              *)
                cp -L -n "$lib" "package/${PKG}/resources/lib/"
                ;;
            esac
          done
          mkdir -p dist
          tar -czf "dist/${PKG}.tar.gz" -C package "$PKG"

      - name: Package macOS demo
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cp build-3dmol-gui/Multiwfn_3DmolGUI "package/${PKG}/Multiwfn_3DmolGUI"
          otool -L build-3dmol-gui/Multiwfn_3DmolGUI > macos-runtime-libs.txt
          awk 'NR>1 {print $1}' macos-runtime-libs.txt | while read -r lib; do
            case "$lib" in
              /usr/lib/*|/System/*|@*)
                ;;
              *)
                if [ -f "$lib" ]; then
                  cp -L -n "$lib" "package/${PKG}/resources/lib/"
                fi
                ;;
            esac
          done
          mkdir -p dist
          tar -czf "dist/${PKG}.tar.gz" -C package "$PKG"

      - name: Package Windows demo
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cp build-3dmol-gui/Multiwfn_3DmolGUI.exe "package/${PKG}/Multiwfn_3DmolGUI.exe"
          : > windows-dlls.log
          processed=""
          while :; do
            changed=0
            for binary in "package/${PKG}/Multiwfn_3DmolGUI.exe" package/"${PKG}"/*.dll; do
              [ -e "$binary" ] || continue
              case " $processed " in
                *" $binary "*) continue ;;
              esac
              processed="$processed $binary"
              objdump -p "$binary" | tee -a windows-dlls.log
              for dll in $(objdump -p "$binary" | awk '/DLL Name:/ {print $3}'); do
                case "$dll" in
                  KERNEL32.dll|msvcrt.dll|USER32.dll|ADVAPI32.dll|SHELL32.dll|WS2_32.dll|bcrypt.dll|api-ms-win-*.dll)
                    ;;
                  *)
                    dll_path="$(command -v "$dll" || true)"
                    if [ -z "$dll_path" ] && [ -f "$MINGW_PREFIX/bin/$dll" ]; then
                      dll_path="$MINGW_PREFIX/bin/$dll"
                    fi
                    if [ -z "$dll_path" ]; then
                      echo "::error::Could not locate runtime DLL $dll"
                      exit 1
                    fi
                    if [ ! -f "package/${PKG}/$dll" ]; then
                      cp "$dll_path" "package/${PKG}/"
                      changed=1
                    fi
                    ;;
                esac
              done
            done
            [ "$changed" -eq 1 ] || break
          done
          find "package/${PKG}" -maxdepth 2 -type f | sort

      - name: Create Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "package/$env:PKG/*" -DestinationPath "dist/$env:PKG.zip" -Force

      - name: Upload GUI demo package
        uses: actions/upload-artifact@v4
        with:
          name: multiwfn-3dmol-gui-demo-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  prerelease:
    name: Publish 3Dmol GUI demo prerelease
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Write release notes
        run: |
          cat > release_notes.md <<'EOF'
          This prerelease publishes early Multiwfn executables with a 3Dmol/Plotly GUI demo backend.

          Highlights:
          - Linux, macOS, and Windows demo packages are built by GitHub Actions.
          - Each executable is built with a new `module GUI` backend compiled in place of the legacy DISLIN GUI.
          - GUI entry points such as `drawmolgui`, `drawisosurgui`, `drawplanegui`, `setboxGUI`, and `miniGUI` now write a 3Dmol session and start a bundled local HTTP service.
          - The session exports the current structure and available `cubmat`/`cubmattmp` grids, then opens the 3Dmol/Plotly frontend through a `multiwfnGui` manifest.
          - The frontend includes structure loading, cube isosurfaces, cube-by-cube coloring, periodic display controls, cube slices, simple 2D plots, PNG export, and manifest export.
          - This is still a demo. Full interactive callbacks that mutate Multiwfn state, including a complete `setboxGUI` round trip, are not finished.

          Python 3 is required for the local 3Dmol HTTP service.
          Feedback, issues, and pull requests are welcome.
          Original Multiwfn license terms are included in `LICENSE.txt`.
          EOF

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="gui-demo-preview-manual-${GITHUB_RUN_NUMBER}"
            git tag "$tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
          fi
          find release-assets -maxdepth 3 -type f -print | sort
          gh release create "$tag" release-assets/*/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "3Dmol GUI demo preview" \
            --notes-file release_notes.md \
            --prerelease
