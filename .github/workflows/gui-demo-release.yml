name: gui-demo-release

on:
  push:
    branches:
      - main
    tags:
      - 'gui-demo-preview-*'
      - 'gui-qt-preview-*'
      - 'v*-gui.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package Multiwfn GUI (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            asset_ext: tar.gz
          - os: macos-latest
            platform: macOS
            asset_ext: tar.gz
          - os: windows-latest
            platform: Windows
            asset_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            gfortran \
            cmake \
            ninja-build \
            libblas-dev \
            liblapack-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libpulse0 \
            libgl1 \
            libegl1

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install gcc cmake ninja
          echo "FC=$(ls $(brew --prefix)/bin/gfortran-* | sort -V | tail -n 1)" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-openblas

      - name: Build Multiwfn GUI executable
        if: runner.os != 'Windows'
        run: |
          set -o pipefail
          default_shell="browser"
          exe_name="Multiwfn_3DmolGUI"
          if [[ "${GITHUB_REF_NAME:-}" == gui-demo-preview-* ]]; then
            default_shell="browser"
            exe_name="Multiwfn_3DmolGUI"
          elif [[ "${GITHUB_REF_NAME:-}" == gui-qt-preview-* || "${GITHUB_REF_NAME:-}" == v*-gui.* || "${GITHUB_EVENT_NAME:-}" == pull_request || "${GITHUB_EVENT_NAME:-}" == workflow_dispatch || "${GITHUB_REF_NAME:-}" == main ]]; then
            default_shell="qt"
            exe_name="Multiwfn_QtGUI"
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            rpath='@loader_path/resources/lib'
          else
            rpath='$ORIGIN/resources/lib'
          fi
          cmake -S . -B build-3dmol-gui -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMULTIWFN_GUI_BACKEND=3dmol \
            -DMULTIWFN_3DMOL_DEFAULT_SHELL="$default_shell" \
            -DMULTIWFN_GNU_HOT_OPT_LEVEL=O3 \
            -DCMAKE_BUILD_RPATH="$rpath" 2>&1 | tee configure.log
          cmake --build build-3dmol-gui --parallel 2 2>&1 | tee build.log
          test -x "build-3dmol-gui/${exe_name}"
          echo "MULTIWFN_GUI_EXE=${exe_name}" >> "$GITHUB_ENV"

      - name: Build Multiwfn GUI executable on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -o pipefail
          default_shell="browser"
          exe_name="Multiwfn_3DmolGUI"
          if [[ "${GITHUB_REF_NAME:-}" == gui-demo-preview-* ]]; then
            default_shell="browser"
            exe_name="Multiwfn_3DmolGUI"
          elif [[ "${GITHUB_REF_NAME:-}" == gui-qt-preview-* || "${GITHUB_REF_NAME:-}" == v*-gui.* || "${GITHUB_EVENT_NAME:-}" == pull_request || "${GITHUB_EVENT_NAME:-}" == workflow_dispatch || "${GITHUB_REF_NAME:-}" == main ]]; then
            default_shell="qt"
            exe_name="Multiwfn_QtGUI"
          fi
          cmake -S . -B build-3dmol-gui -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMULTIWFN_GUI_BACKEND=3dmol \
            -DMULTIWFN_3DMOL_DEFAULT_SHELL="$default_shell" \
            -DMULTIWFN_GNU_HOT_OPT_LEVEL=O3 2>&1 | tee configure.log
          cmake --build build-3dmol-gui --parallel 2 2>&1 | tee build.log
          test -x "build-3dmol-gui/${exe_name}.exe"
          echo "MULTIWFN_GUI_EXE=${exe_name}" >> "$GITHUB_ENV"

      - name: Verify cube coordinate units
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          node --test frontend/3dmol-viewer/tests/*.test.js
          tests/functional/run_3dmol_cube_unit_test.sh "build-3dmol-gui/${MULTIWFN_GUI_EXE}"

      - name: Build Qt native launcher
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || startsWith(github.ref_name, 'gui-qt-preview-') || contains(github.ref_name, '-gui.')
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PyQt6 PyQt6-WebEngine
          python -m PyInstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name multiwfn_qt_gui \
            --hidden-import PyQt6.QtWebEngineCore \
            --hidden-import PyQt6.QtWebEngineWidgets \
            --distpath qt-launcher-dist \
            --workpath qt-launcher-build \
            frontend/qt-multiwfn-gui/qt_multiwfn_gui.py

      - name: Summarize build failure
        if: failure()
        shell: bash
        run: |
          {
            echo "## GUI demo build failure tail"
            echo
            echo '```text'
            tail -n 200 build.log 2>/dev/null || tail -n 200 configure.log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          first_error="$(grep -Eim1 '(^|: )(fatal error|error:|undefined reference|ld:|ninja: build stopped)' build.log configure.log 2>/dev/null || true)"
          if [ -n "$first_error" ]; then
            echo "::error::$first_error"
          fi

      - name: Prepare common package files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "${GITHUB_EVENT_NAME:-}" == workflow_dispatch ]]; then
            tag="gui-qt-preview-manual-${GITHUB_RUN_NUMBER}"
          else
            tag="gui-qt-preview-ci-${GITHUB_RUN_NUMBER}"
          fi
          if [[ "$tag" == v*-gui.* ]]; then
            pkg="Multiwfn-gui-${tag}-${{ matrix.platform }}"
          elif [[ "$tag" == gui-qt-preview-* || "${GITHUB_EVENT_NAME:-}" == pull_request || "${GITHUB_EVENT_NAME:-}" == workflow_dispatch || "${GITHUB_REF_NAME:-}" == main ]]; then
            pkg="Multiwfn-qt-gui-preview-${tag}-${{ matrix.platform }}"
          else
            pkg="Multiwfn-3dmol-gui-demo-${tag}-${{ matrix.platform }}"
          fi
          echo "PKG=$pkg" >> "$GITHUB_ENV"
          mkdir -p "package/${pkg}/resources/lib" "package/${pkg}/resources/tools" "package/${pkg}/resources/frontend"
          cp LICENSE.txt "package/${pkg}/LICENSE.txt"
          cp ATTRIBUTION.txt "package/${pkg}/ATTRIBUTION.txt"
          cp settings.ini "package/${pkg}/settings.ini"
          cp tools/multiwfn_matterviz_server.py "package/${pkg}/resources/tools/"
          cp tools/multiwfn_matterviz_file_dialog.py "package/${pkg}/resources/tools/"
          cp tools/multiwfn_qt_gui.py "package/${pkg}/resources/tools/"
          cp -R frontend/3dmol-viewer "package/${pkg}/resources/frontend/"
          cp -R frontend/qt-multiwfn-gui "package/${pkg}/resources/frontend/"
          if [[ -f qt-launcher-dist/multiwfn_qt_gui.exe ]]; then
            cp qt-launcher-dist/multiwfn_qt_gui.exe "package/${pkg}/resources/tools/"
          elif [[ -f qt-launcher-dist/multiwfn_qt_gui ]]; then
            cp qt-launcher-dist/multiwfn_qt_gui "package/${pkg}/resources/tools/"
            chmod +x "package/${pkg}/resources/tools/multiwfn_qt_gui"
          fi
          if [[ "$tag" == gui-qt-preview-* || "$tag" == v*-gui.* || "${GITHUB_EVENT_NAME:-}" == pull_request || "${GITHUB_EVENT_NAME:-}" == workflow_dispatch || "${GITHUB_REF_NAME:-}" == main ]]; then
            test -f "package/${pkg}/resources/tools/multiwfn_qt_gui.exe" || test -x "package/${pkg}/resources/tools/multiwfn_qt_gui"
          fi

      - name: Package Linux demo
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          exe_name="${MULTIWFN_GUI_EXE:-Multiwfn_3DmolGUI}"
          cp "build-3dmol-gui/${exe_name}" "package/${PKG}/${exe_name}"
          ldd "build-3dmol-gui/${exe_name}" > linux-runtime-libs.txt
          awk '/=> \// {print $3}' linux-runtime-libs.txt | while read -r lib; do
            base="$(basename "$lib")"
            case "$base" in
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|ld-linux-*.so.*|libmvec.so.*|librt.so.*|libresolv.so.*)
                ;;
              *)
                cp -L -n "$lib" "package/${PKG}/resources/lib/"
                ;;
            esac
          done
          mkdir -p dist
          tar -czf "dist/${PKG}.tar.gz" -C package "$PKG"

      - name: Package macOS demo
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          exe_name="${MULTIWFN_GUI_EXE:-Multiwfn_3DmolGUI}"
          cp "build-3dmol-gui/${exe_name}" "package/${PKG}/${exe_name}"
          otool -L "build-3dmol-gui/${exe_name}" > macos-runtime-libs.txt
          awk 'NR>1 {print $1}' macos-runtime-libs.txt | while read -r lib; do
            case "$lib" in
              /usr/lib/*|/System/*|@*)
                ;;
              *)
                if [ -f "$lib" ]; then
                  cp -L -n "$lib" "package/${PKG}/resources/lib/"
                fi
                ;;
            esac
          done
          mkdir -p dist
          tar -czf "dist/${PKG}.tar.gz" -C package "$PKG"

      - name: Package Windows demo
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          exe_name="${MULTIWFN_GUI_EXE:-Multiwfn_3DmolGUI}"
          cp "build-3dmol-gui/${exe_name}.exe" "package/${PKG}/${exe_name}.exe"
          : > windows-dlls.log
          processed=""
          while :; do
            changed=0
            for binary in "package/${PKG}/${exe_name}.exe" package/"${PKG}"/*.dll; do
              [ -e "$binary" ] || continue
              case " $processed " in
                *" $binary "*) continue ;;
              esac
              processed="$processed $binary"
              objdump -p "$binary" | tee -a windows-dlls.log
              for dll in $(objdump -p "$binary" | awk '/DLL Name:/ {print $3}'); do
                case "$dll" in
                  KERNEL32.dll|msvcrt.dll|USER32.dll|ADVAPI32.dll|SHELL32.dll|WS2_32.dll|bcrypt.dll|api-ms-win-*.dll)
                    ;;
                  *)
                    dll_path="$(command -v "$dll" || true)"
                    if [ -z "$dll_path" ] && [ -f "$MINGW_PREFIX/bin/$dll" ]; then
                      dll_path="$MINGW_PREFIX/bin/$dll"
                    fi
                    if [ -z "$dll_path" ]; then
                      echo "::error::Could not locate runtime DLL $dll"
                      exit 1
                    fi
                    if [ ! -f "package/${PKG}/$dll" ]; then
                      cp "$dll_path" "package/${PKG}/"
                      changed=1
                    fi
                    ;;
                esac
              done
            done
            [ "$changed" -eq 1 ] || break
          done
          find "package/${PKG}" -maxdepth 2 -type f | sort

      - name: Create Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "package/$env:PKG/*" -DestinationPath "dist/$env:PKG.zip" -Force

      - name: Verify attribution in GUI archive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            unzip -Z1 "dist/$PKG.zip" | grep -Fx LICENSE.txt
            unzip -Z1 "dist/$PKG.zip" | grep -Fx ATTRIBUTION.txt
          else
            tar -tzf "dist/$PKG.tar.gz" | grep -Fx "$PKG/LICENSE.txt"
            tar -tzf "dist/$PKG.tar.gz" | grep -Fx "$PKG/ATTRIBUTION.txt"
          fi

      - name: Upload GUI package
        uses: actions/upload-artifact@v4
        with:
          name: multiwfn-gui-package-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Multiwfn GUI release
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Write release notes
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "${GITHUB_EVENT_NAME:-}" == workflow_dispatch ]]; then
            tag="gui-qt-preview-manual-${GITHUB_RUN_NUMBER}"
          else
            tag="gui-qt-preview-ci-${GITHUB_RUN_NUMBER}"
          fi
          if [[ "$tag" == v*-gui.* ]]; then
            version="${tag#v}"
            version="${version%-gui.*}"
            cat > release_notes.md <<'EOF'
          This release publishes Multiwfn executables with the Qt/3Dmol GUI backend.

          Highlights:
          - Linux, macOS, and Windows GUI packages are built by GitHub Actions.
          - The main executable is named `Multiwfn_QtGUI`.
          - GUI entry points write a Multiwfn visualization session and launch a bundled native Qt window.
          - The Qt window mirrors the legacy DISLIN control layout and embeds the 3Dmol/Plotly renderer through QtWebEngine.
          - Runtime settings and original Multiwfn license terms are included in the package.

          Note: the Qt/3Dmol GUI is still under active development. Please report GUI workflow regressions through issues.
          EOF
            echo "RELEASE_TITLE=Multiwfn ${version} GUI build" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ "$tag" == gui-qt-preview-* ]]; then
            cat > release_notes.md <<'EOF'
          This prerelease publishes early Multiwfn executables with a native Qt GUI shell.

          Highlights:
          - Linux, macOS, and Windows Qt GUI preview packages are built by GitHub Actions.
          - The main executable is named `Multiwfn_QtGUI` and is compiled with the new GUI backend defaulting to the Qt shell.
          - GUI entry points write a Multiwfn visualization session and launch a bundled `multiwfn_qt_gui` native launcher.
          - The Qt window mirrors the legacy DISLIN control layout and embeds the 3Dmol/Plotly renderer through QtWebEngine when available.
          - The external browser service is not the default path for this prerelease; the browser service script remains in resources only as a fallback/debug tool.
          - This is still a preview. Full callback round trips that mutate live Multiwfn state are not complete.

          Original Multiwfn license terms are included in `LICENSE.txt`.
          EOF
            echo "RELEASE_TITLE=Qt GUI preview" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            exit 0
          fi
          cat > release_notes.md <<'EOF'
          This prerelease publishes early Multiwfn executables with a 3Dmol/Plotly GUI demo backend.

          Highlights:
          - Linux, macOS, and Windows demo packages are built by GitHub Actions.
          - Each executable is built with a new `module GUI` backend compiled in place of the legacy DISLIN GUI.
          - GUI entry points such as `drawmolgui`, `drawisosurgui`, `drawplanegui`, `setboxGUI`, and `miniGUI` now write a 3Dmol session and start a bundled local HTTP service.
          - The session exports the current structure and available `cubmat`/`cubmattmp` grids, then opens the 3Dmol/Plotly frontend through a `multiwfnGui` manifest.
          - The frontend now starts from a Multiwfn-like control panel with RETURN, view rotation, orbital/layer browsing, isosurface style controls, cube-by-cube coloring, periodic controls, slices, and 2D plots.
          - The frontend includes structure loading, cube isosurfaces, cube-by-cube coloring, periodic display controls, cube slices, simple 2D plots, PNG export, and manifest export.
          - This is still a demo. Full interactive callbacks that mutate Multiwfn state, including a complete `setboxGUI` round trip, are not finished.

          Python 3 is required for the local 3Dmol HTTP service.
          Feedback, issues, and pull requests are welcome.
          Original Multiwfn license terms are included in `LICENSE.txt`.
          EOF
          echo "RELEASE_TITLE=3Dmol GUI demo preview" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="gui-qt-preview-manual-${GITHUB_RUN_NUMBER}"
            git tag "$tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
          fi
          find release-assets -maxdepth 3 -type f -print | sort
          release_flags=()
          if [[ "${RELEASE_PRERELEASE:-true}" == "true" ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$tag" release-assets/*/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${RELEASE_TITLE:-3Dmol GUI demo preview}" \
            --notes-file release_notes.md \
            "${release_flags[@]}"
