name: matterviz-gui

on:
  push:
    branches:
      - feature/matterviz-gui
  pull_request:
    branches:
      - main
    paths:
      - CMakeLists.txt
      - noGUI/GUI_3dmol.f90
      - tools/multiwfn_3dmol_server.py
      - tools/multiwfn_matterviz_webview.py
      - tests/test_matterviz_webview.py
      - frontend/matterviz-viewer/**
      - frontend/matterviz-desktop/**
      - docs/matterviz-webview.md
      - .github/workflows/matterviz-gui.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: matterviz-gui-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: MatterViz frontend and Multiwfn adapter
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: pnpm
          cache-dependency-path: frontend/matterviz-viewer/pnpm-lock.yaml

      - name: Check and build MatterViz frontend
        working-directory: frontend/matterviz-viewer
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm test
          pnpm check
          pnpm build

      - name: Validate MatterViz WebView configuration
        run: python3 frontend/matterviz-desktop/scripts/validate-config.py

      - name: Test MatterViz WebView adapter
        run: python3 -m unittest -v tests/test_matterviz_webview.py

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Multiwfn build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            gfortran cmake ninja-build libblas-dev liblapack-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check MatterViz WebView shell
        working-directory: frontend/matterviz-desktop
        run: cargo check

      - name: Build Multiwfn with MatterViz frontend
        run: |
          set -euo pipefail
          cmake -S . -B build-matterviz-gui -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMULTIWFN_GUI_BACKEND=3dmol \
            -DMULTIWFN_WEB_FRONTEND=matterviz \
            -DMULTIWFN_3DMOL_DEFAULT_SHELL=browser \
            -DMULTIWFN_GNU_HOT_OPT_LEVEL=O3
          cmake --build build-matterviz-gui --parallel 2
          test -x build-matterviz-gui/Multiwfn_3DmolGUI
          test -f build-matterviz-gui/resources/frontend/matterviz-viewer/dist/index.html
